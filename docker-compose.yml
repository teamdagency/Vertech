services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vertech
      POSTGRES_PASSWORD: vertech
      POSTGRES_DB: vertech
    ports:
      - "5432:5432"
    volumes:
      - vertech_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertech -d vertech"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vertech:vertech@db:5432/vertech
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  vertech_pgdata:
