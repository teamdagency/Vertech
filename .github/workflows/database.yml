name: Database

on:
  push:
    paths:
      - "database/**"
      - ".github/workflows/database.yml"
  pull_request:
    paths:
      - "database/**"
      - ".github/workflows/database.yml"

jobs:
  postgres-schema:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vertech
          POSTGRES_PASSWORD: vertech
          POSTGRES_DB: vertech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vertech -d vertech_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: vertech_test
      PGUSER: vertech
      PGPASSWORD: vertech

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema
        run: psql -v ON_ERROR_STOP=1 -f database/schema.sql

      - name: Run smoke tests
        run: psql -v ON_ERROR_STOP=1 -f database/smoke_test.sql

      - name: Load development seeds
        run: psql -v ON_ERROR_STOP=1 -f database/seeds.sql
