name: API

on:
  push:
    paths:
      - "app/**"
      - "database/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "app/**"
      - "database/**"
      - ".github/workflows/api.yml"

jobs:
  build-and-healthcheck:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vertech
          POSTGRES_PASSWORD: vertech
          POSTGRES_DB: vertech
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vertech -d vertech"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://vertech:vertech@localhost:5432/vertech
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema
        run: psql -v ON_ERROR_STOP=1 -h localhost -U vertech -d vertech -f database/schema.sql
        env:
          PGPASSWORD: vertech

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Boot API and check /api/v1/health
        working-directory: app
        run: |
          node dist/main.js &
          APP_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/api/v1/health; then
              echo "API en ligne et connectée à la base"
              kill $APP_PID
              exit 0
            fi
            sleep 1
          done
          echo "L'API n'a pas répondu à temps"
          kill $APP_PID || true
          exit 1
